name: Django CI (Advanced)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false # 片方のバージョンが落ちても、もう片方の結果を最後まで見たい
      matrix:
        python: ["3.11", "3.12"] # 複数の環境で同時にテスト

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: astral-sh/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff (Lint)
        run: uv run ruff check .

      - name: Run Pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings
        # ログを pytest.log に保存しつつ、画面にも出す
        run: uv run pytest -v | tee pytest.log

      - name: Post Summary
        if: always() # テストが失敗しても必ず実行してレポートを残す
        run: |
          echo "## テストレポート (Python ${{ matrix.python }})" >> $GITHUB_STEP_SUMMARY
          echo "### 実行ログ（抜粋）" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          tail -n 20 pytest.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY